name: youth_safety_app
description: "Youth Safety - SOS alerts, emergency contacts, and journey tracking."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ---------- Firebase ----------
  firebase_core: ^4.6.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.1.3
  firebase_messaging: ^16.2.0

  # ---------- State Management ----------
  provider: ^6.1.5

  # ---------- Notifications ----------
  flutter_local_notifications: ^18.0.1

  # ---------- Modules ----------
  geolocator: ^13.0.2
  url_launcher: ^6.3.1
  shake: ^3.0.0
  audioplayers: ^6.1.0

  # ---------- Utilities ----------
  cupertino_icons: ^1.0.8
  intl: ^0.20.1
  uuid: ^4.5.1
  shared_preferences: ^2.3.3
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#E53935"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#E53935"
  image: "assets/icon/splash_logo.png"
  android_12:
    image: "assets/icon/splash_logo.png"
    color: "#E53935"